<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngôi Chùa Online - Bình An</title>
    <style>
        /* NỀN CHUNG CỦA TRANG WEB */
        body { 
            text-align: center; 
            background-color: #1a0f05; 
            font-family: 'Times New Roman', Times, serif; 
            color: #fff; 
            margin: 0; 
            padding-bottom: 50px;
            overflow-x: hidden;
            position: relative;
        }

        /* KHUNG BAO QUÁT */
        .altar-container { 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: start;
            padding-top: 30px;
            background: radial-gradient(circle, rgba(82, 37, 13, 1) 0%, rgba(20, 10, 2, 1) 100%); 
            position: relative;
            z-index: 1;
        }

        /* HIỆU ỨNG HOA SEN RƠI TỪ TRÊN XUỐNG */
        .petals {
            position: fixed; top: -10%; z-index: 0;
            font-size: 20px; user-select: none; pointer-events: none;
            animation: fall linear infinite;
            opacity: 0.6;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); opacity: 0; }
        }

        /* TRANG TRÍ ĐÈN LỒNG HAI BÊN */
        .lantern {
            font-size: 50px; position: absolute; top: 10px;
            animation: swing 3s infinite ease-in-out alternate;
            transform-origin: top center;
            filter: drop-shadow(0 0 15px rgba(255, 50, 0, 0.8)); z-index: 10;
        }
        .lantern.left { left: 5%; }
        .lantern.right { right: 5%; animation-delay: 0.5s; }
        
        @keyframes swing {
            from { transform: rotate(10deg); }
            to { transform: rotate(-10deg); }
        }

        h1 { color: #ffcc00; text-shadow: 0 0 10px #ff3300, 2px 2px 4px #000; margin: 10px 0; font-size: 32px; letter-spacing: 2px;}
        h2 { color: #d4af37; text-shadow: 2px 2px 4px #000; margin: 0 0 20px 0; font-weight: normal; font-style: italic;}
        
        /* ẢNH TƯỢNG PHẬT */
        .buddha-statue {
            width: 90%; max-width: 500px; height: auto; border-radius: 15px;    
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5); 
            margin-bottom: -30px; z-index: 2;             
        }

        /* KHUNG BÁT HƯƠNG */
        .main-altar { position: relative; width: 300px; height: 160px; z-index: 3; margin-bottom: 30px; }
        .bathuong { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 140px; }
        
        /* HIỆU ỨNG NHANG KHÓI */
        .incense-stick { 
            position: absolute; bottom: 50px; left: 51%; transform: translateX(-50%); 
            width: 35px; display: none; 
            animation: burn 2.5s infinite ease-in-out; 
        }
        @keyframes burn {
            0% { opacity: 0.7; transform: translateX(-50%) translateY(0) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) translateY(-5px) scale(1.05); }
            100% { opacity: 0.7; transform: translateX(-50%) translateY(0) scale(1); }
        }

        /* CỤM NÚT BẤM */
        .button-group { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; z-index: 3;}
        
        button.act-btn { 
            padding: 12px 30px; font-size: 16px; cursor: pointer; 
            background: linear-gradient(145deg, #8b2500, #5c1400); 
            color: #ffcc00; border: 2px solid #d4af37; border-radius: 30px; 
            text-transform: uppercase; font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: all 0.2s; 
            width: 80%; max-width: 300px;
        }
        button.act-btn:active { box-shadow: 0 1px 2px rgba(0,0,0,0.5); transform: translateY(3px); }
        button.act-btn.xam-btn { background: linear-gradient(145deg, #b8860b, #8b6508); color: #fff;}
        button.act-btn:disabled { opacity: 0.7; cursor: not-allowed; } /* Trạng thái nút khi đang chờ gieo quẻ */

        /* KHUNG LỜI KHẤN & QR */
        .wish-section, .qr-section { 
            margin-top: 35px; background: rgba(30, 15, 5, 0.85); 
            padding: 25px 20px; border-radius: 15px; width: 85%; max-width: 500px; 
            border: 1px solid #d4af37; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 3;
        }
        textarea { width: 90%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #d4af37; background: #fff8dc; font-family: inherit; font-size: 15px; color: #333;}
        .qr-code-img { width: 180px; border: 3px solid #d4af37; padding: 5px; background: white; margin-top: 15px; border-radius: 10px;}

        /* POPUP HIỂN THỊ QUẺ XĂM */
        .modal-xam {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
        }
        .xam-content {
            background: #fff8dc; color: #8b2500; width: 85%; max-width: 400px; padding: 30px 20px;
            border-radius: 10px; border: 4px double #d4af37; text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); position: relative;
        }
        .xam-title { font-size: 24px; font-weight: bold; color: #b22222; margin-bottom: 15px; border-bottom: 1px solid #d4af37; padding-bottom: 10px;}
        .xam-poem { font-style: italic; font-size: 16px; margin-bottom: 15px; white-space: pre-line; line-height: 1.5;}
        .xam-meaning { font-size: 15px; color: #333; font-weight: bold; background: rgba(212, 175, 55, 0.2); padding: 10px; border-radius: 5px;}
        .close-btn { margin-top: 20px; padding: 8px 20px; background: #8b2500; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 15px;}
    </style>
</head>
<body>

    <div id="snowflakes"></div>

    <div class="altar-container">
        <div class="lantern left">🏮</div>
        <div class="lantern right">🏮</div>

        <h1>Ngôi Chùa Online</h1>
        <h2>Phật Tại Tâm Trung</h2>

        <img src="image_0.png" alt="Tượng Phật" class="buddha-statue">

        <div class="main-altar">
            <img src="image_1.png" alt="Bát Hương" class="bathuong">
            <img id="incense-stick" src="image_2.png" alt="Nhang" class="incense-stick">
        </div>

        <div class="button-group">
            <button class="act-btn" onclick="thapNhang()">Thắp Nén
